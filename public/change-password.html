<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>qwen-web · change password</title>
  <link rel="icon" href="data:," />
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; padding: 0; height: 100%; background: #0b0d12; color: #d8dee9; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    body { display: grid; place-items: center; height: 100vh; }
    .card { background: #151922; border: 1px solid #2a303c; border-radius: 8px; padding: 1.5rem 1.75rem; width: min(420px, 90vw); }
    h1 { margin: 0 0 1rem; font-size: 1.1rem; font-weight: 500; }
    label { display: block; font-size: 0.8rem; opacity: 0.8; margin-bottom: 0.35rem; }
    input[type=password] { width: 100%; box-sizing: border-box; background: #0b0d12; color: #d8dee9; border: 1px solid #2a303c; border-radius: 4px; padding: 0.55rem 0.7rem; font: inherit; margin-bottom: 0.9rem; }
    button { background: #2a6; color: #fff; border: 0; padding: 0.55rem 1rem; border-radius: 4px; cursor: pointer; font: inherit; width: 100%; }
    button[disabled] { opacity: 0.5; cursor: not-allowed; }
    .err { color: #ff7a7a; font-size: 0.8rem; min-height: 1em; margin-bottom: 0.6rem; }
    .ok { color: #92d18a; font-size: 0.8rem; margin-bottom: 0.6rem; }
  </style>
</head>
<body>
<div class="card">
  <h1>Change password</h1>
  <form id="form">
    <div class="err" id="err"></div>
    <label for="current">Current password</label>
    <input id="current" type="password" autocomplete="current-password" required />
    <label for="new1">New password (min 8 chars)</label>
    <input id="new1" type="password" autocomplete="new-password" required minlength="8" />
    <label for="new2">Confirm new password</label>
    <input id="new2" type="password" autocomplete="new-password" required minlength="8" />
    <button type="submit" id="submit">Change password</button>
  </form>
</div>
<script>
(() => {
  const err = document.getElementById('err');
  document.getElementById('form').addEventListener('submit', async (ev) => {
    ev.preventDefault();
    err.textContent = '';
    const currentPassword = document.getElementById('current').value;
    const n1 = document.getElementById('new1').value;
    const n2 = document.getElementById('new2').value;
    if (n1 !== n2) { err.textContent = 'New passwords do not match.'; return; }
    const r = await fetch('/auth/change-password', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ currentPassword, newPassword: n1 }),
    });
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      err.textContent = j.error === 'invalid_credentials'
        ? 'Current password is wrong.'
        : `Failed (${j.error ?? r.status}).`;
      return;
    }
    // Password change revokes the session — send them back to login.
    location.replace('/login.html');
  });
})();
</script>
</body>
</html>
